<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .box{rx:10;ry:10;stroke-width:1.5;}
      .t{fill:#0f172a;font-size:14px;}
      .ti{fill:#fff;font-weight:600;font-size:15px;}
      .s{fill:#475569;font-size:11.5px;}
      .si{fill:#e2e8f0;font-size:11.5px;}
      .lbl{fill:#475569;font-size:11px;font-style:italic;}
      .edge{stroke:#475569;stroke-width:1.6;fill:none;}
      .edged{stroke:#94a3b8;stroke-width:1.6;fill:none;stroke-dasharray:5 4;}
      .zone{fill:none;stroke:#cbd5e1;stroke-width:1.2;stroke-dasharray:3 3;rx:14;ry:14;}
    </style>
  </defs>

  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">USB-IP HIL Controller — System Architecture</text>
  <text x="500" y="50" text-anchor="middle" class="s">One orchestrator fans hardware-in-the-loop work out to a fleet of bench Pis over SSH</text>

  <!-- CI -->
  <rect x="40" y="90" width="190" height="92" rx="10" fill="#334155"/>
  <text x="135" y="118" text-anchor="middle" class="ti">GitHub Actions CI</text>
  <text x="135" y="140" text-anchor="middle" class="si">hil-test-suite.yml</text>
  <text x="135" y="158" text-anchor="middle" class="si">POST job · long-poll result</text>
  <text x="135" y="174" text-anchor="middle" class="si">joins Tailscale to reach ctrl</text>

  <!-- Tailscale link label -->
  <path class="edge" d="M230 136 H300" marker-end="url(#arr)"/>
  <text x="265" y="128" text-anchor="middle" class="lbl">Tailscale</text>

  <!-- Controller -->
  <rect x="300" y="78" width="270" height="200" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="435" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#4338ca">Controller host (this repo)</text>
  <text x="435" y="117" text-anchor="middle" class="s">independent Linux box · no DUTs attached</text>

  <rect x="318" y="128" width="234" height="40" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="435" y="146" text-anchor="middle" class="t" font-weight="600" font-size="12.5">FastAPI · /v1 API + HTMX dashboard</text>
  <text x="435" y="161" text-anchor="middle" class="s">jobs · targets · topology · cameras · auth</text>

  <rect x="318" y="176" width="113" height="44" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="374" y="195" text-anchor="middle" class="t" font-weight="600">Scheduler +</text>
  <text x="374" y="210" text-anchor="middle" class="t" font-weight="600">async workers</text>

  <rect x="439" y="176" width="113" height="44" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="495" y="195" text-anchor="middle" class="t" font-weight="600">SQLite store</text>
  <text x="495" y="210" text-anchor="middle" class="s">jobs · events · audit</text>

  <rect x="318" y="228" width="234" height="36" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="435" y="251" text-anchor="middle" class="t">Device adapters over per-host SSH transport</text>

  <!-- SSH fan-out -->
  <path class="edge" d="M570 200 H640 V120 H700" marker-end="url(#arr)"/>
  <path class="edge" d="M570 240 H660 V300 H700" marker-end="url(#arr)"/>
  <text x="648" y="180" text-anchor="middle" class="lbl">SSH (key auth)</text>

  <!-- HIL fleet zone -->
  <rect x="690" y="78" width="290" height="300" class="zone"/>
  <text x="835" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">HIL host fleet — each owns its DUTs</text>

  <!-- rpi-displays -->
  <rect x="700" y="108" width="270" height="120" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="835" y="128" text-anchor="middle" class="t" font-weight="700">rpi-displays (Pi Zero 2W)  ·  rpi-hil006</text>
  <text x="835" y="145" text-anchor="middle" class="s">microcontroller fleet</text>
  <rect x="712" y="156" width="120" height="58" rx="7" fill="#fff" stroke="#5eead4"/>
  <text x="772" y="175" text-anchor="middle" class="s">Genesys USB hub</text>
  <text x="772" y="191" text-anchor="middle" class="s">MCP23017 solenoid</text>
  <text x="772" y="207" text-anchor="middle" class="s">power/reset 0x20</text>
  <rect x="840" y="156" width="120" height="58" rx="7" fill="#fff" stroke="#5eead4"/>
  <text x="900" y="175" text-anchor="middle" class="s">esptool/picotool</text>
  <text x="900" y="191" text-anchor="middle" class="s">usbip-autobind</text>
  <text x="900" y="207" text-anchor="middle" class="s">CSI camera + serial</text>

  <!-- sbc fleet -->
  <rect x="700" y="240" width="270" height="60" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="835" y="263" text-anchor="middle" class="t" font-weight="700">rpi-hil001 … rpi-hil007</text>
  <text x="835" y="282" text-anchor="middle" class="s">single-board-computer DUTs (per-port power planned)</text>

  <!-- DUTs -->
  <rect x="700" y="318" width="270" height="50" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="835" y="338" text-anchor="middle" class="t" font-weight="700">DUTs — units under test, wired to a port</text>
  <text x="835" y="356" text-anchor="middle" class="s">ESP32-S2/S3 · SAMD51 · RP2040 · Pi 5</text>
  <path class="edge" d="M835 228 V236" marker-end="url(#arr)"/>
  <path class="edge" d="M835 300 V314" marker-end="url(#arr)"/>

  <!-- ProtoMQ broker -->
  <rect x="300" y="320" width="270" height="80" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="435" y="344" text-anchor="middle" class="t" font-weight="700" fill="#6d28d9">ProtoMQ broker (per-session)</text>
  <text x="435" y="363" text-anchor="middle" class="s">MQTT 1884 (live IO 8883) · web UI 5173</text>
  <text x="435" y="382" text-anchor="middle" class="s">on controller / DUT host / external; observed</text>

  <!-- DUT to broker MQTT -->
  <path class="edged" d="M700 343 C620 360 600 360 570 360" marker-end="url(#arr)"/>
  <text x="635" y="332" text-anchor="middle" class="lbl">DUT ⇄ MQTT</text>

  <!-- controller observes broker -->
  <path class="edged" d="M435 278 V318" marker-end="url(#arr)"/>
  <text x="470" y="300" text-anchor="middle" class="lbl">observe</text>

  <!-- Legend -->
  <text x="40" y="470" font-size="13" font-weight="700" fill="#0f172a">Key properties</text>
  <text x="40" y="492" class="s">• Single controller process, single SQLite file, asyncio worker pool — no Redis/Celery/external broker in v1.</text>
  <text x="40" y="512" class="s">• Work runs ON the HIL host that owns the device; the controller only orchestrates over SSH (LocalTransport variant runs on-box).</text>
  <text x="40" y="532" class="s">• Per-device asyncio locks + per-host concurrency semaphore (SBC hosts = 1 job at a time); optional exclusive-host lock for dmesg/usbmon capture.</text>
  <text x="40" y="552" class="s">• Read-only dashboard pages are public on the LAN; every write (job submit, config) needs a bearer token or GitHub OIDC.</text>
  <text x="40" y="572" class="s">• Topology (hosts, devices, auxes, muxes, cameras, connections) is seeded from /etc/hil/*.yaml and hydrated into the DB on startup.</text>

  <rect x="40" y="590" width="16" height="14" rx="3" fill="#eef2ff" stroke="#4f46e5"/><text x="62" y="601" class="s">controller</text>
  <rect x="150" y="590" width="16" height="14" rx="3" fill="#ccfbf1" stroke="#0d9488"/><text x="172" y="601" class="s">HIL host</text>
  <rect x="250" y="590" width="16" height="14" rx="3" fill="#fef3c7" stroke="#d97706"/><text x="272" y="601" class="s">DUT</text>
  <rect x="330" y="590" width="16" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed"/><text x="352" y="601" class="s">broker</text>
  <rect x="420" y="590" width="16" height="14" rx="3" fill="#334155"/><text x="442" y="601" class="s">CI caller</text>
</svg>
